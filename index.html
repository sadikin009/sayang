<!DOCTYPE html>
<html>
<head>

<title>For Someone Special ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}


body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
overflow:hidden;

}


/* LOGIN */

#login{

background:white;
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 0 40px white;

}


h1{

color:#ff416c;
font-size:35px;

}


input,textarea{

padding:15px;
width:300px;
border-radius:30px;
border:2px solid pink;
font-size:18px;
text-align:center;

}


button{

margin-top:20px;
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff416c;
color:white;
font-size:18px;
cursor:pointer;

}


button:hover{

background:#ff1744;

}



/* HALAMAN CINTA */


#lovePage{

display:none;
color:white;
text-align:center;

}



.card{

width:750px;
padding:40px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(15px);
border-radius:30px;

}



img{

width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:5px solid white;

}



#pesan{

font-size:22px;
margin:20px;
line-height:1.5;

}



/* RUNNING TEXT */


.container{

background:black;
height:60px;
border-radius:30px;
overflow:hidden;
padding:10px;

}



#running{

color:yellow;
font-size:30px;
font-weight:bold;
white-space:nowrap;
position:relative;
text-shadow:0 0 15px yellow;

}



/* FORM */


textarea{

height:100px;
resize:none;
margin-top:20px;

}



#hasil{

margin-top:20px;
font-size:22px;

}



/* tombol tidak */


#tidak{

position:absolute;

}



/* HATI */


.heart{

position:absolute;
font-size:25px;
animation:jatuh 6s linear infinite;

}



@keyframes jatuh{

from{

transform:translateY(-100px);

}

to{

transform:translateY(100vh);

}

}



/* TERIMA */


#terima{

display:none;
font-size:50px;
color:white;
text-align:center;

}


</style>

</head>


<body>



<!-- LOGIN -->


<div id="login">


<h1>❤️ Untuk Kamu ❤️</h1>


<p>Masukkan nama kamu</p>

<br>


<input id="nama" placeholder="Nama kamu">


<br>


<button onclick="mulai()">

Buka Pesan 💌

</button>


</div>





<!-- LOVE PAGE -->


<div id="lovePage">


<div class="card">


<img src="foto.jpg">


<h1 id="judul"></h1>


<p id="pesan"></p>



<div class="container">

<div id="running">

Aku punya sesuatu untuk kamu ❤️

</div>

</div>




<textarea id="jawaban"
placeholder="Tulis jawaban kamu...">
</textarea>



<br>


<button onclick="kirimWA()">

Kirim Pesan 💌

</button>



<br>


<button onclick="yes()">

💖 Aku Mau 💖

</button>



<button id="tidak" onclick="no()">

Tidak 😢

</button>



<p id="hasil"></p>


</div>

</div>










<audio id="musik" loop>

<source src="musik.mp3" type="audio/mp3">

</audio>





<script>


let nama;



// mulai


function mulai(){


nama=document.getElementById("nama").value;


if(nama==""){

alert("Masukkan nama dulu ❤️");

return;

}



document.getElementById("musik").play();



document.getElementById("login").style.display="none";


document.getElementById("lovePage").style.display="block";



document.getElementById("judul").innerHTML=

"Untuk "+nama+" ❤️";



document.getElementById("pesan").innerHTML=


"Apakah kamu mau menjadi seseorang yang spesial dalam hidupku? 💖"

"Sayang ada sesuatu hal yang ingin aku sampaikan mungkin ini bisa jadi permintaan maaf aku ke kamu karena aku blom bisa menjadi apa yang kamu inginkann":

}



// RUNNING TEXT


let posisi=750;

let text=document.getElementById("running");


setInterval(()=>{


posisi--;

text.style.left=posisi+"px";


if(posisi < -text.offsetWidth){

posisi=750;

}


},10);






// KIRIM FORM KE WA


function kirimWA(){


let jawaban=document.getElementById("jawaban").value;



if(jawaban==""){

alert("Tulis jawaban dulu ❤️");

return;

}



let nomor="6281274365441";



let pesan=

"Halo ❤️%0A%0A"+

"Aku mendapat pesan dari "+nama+" ❤️%0A%0A"+

"Jawaban:%0A"+

jawaban;



let url=

"https://wa.me/"+nomor+"?text="+pesan;



window.open(url,"_blank");


}





// TOMBOL MAU


function yes(){

    let nomor = "6281274365441"; 
    // Pastikan nomor memakai kode negara 62


    let jawaban = document.getElementById("jawaban").value;


    let pesan = 
    "Halo ❤️\n\n" +
    "Ada jawaban dari " + nama + " ❤️\n\n" +
    "Status: AKU MAU ❤️\n\n" +
    "Pesan dia:\n" +
    (jawaban || "Aku mau menerima kamu ❤️");


    // encode pesan agar terbaca WhatsApp
    let url = 
    "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);


    window.location.href = url;

}




// tombol tidak kabur


function no(){


let tombol=document.getElementById("tidak");


tombol.style.left=Math.random()*80+"%";


tombol.style.top=Math.random()*80+"%";


}





// hati jatuh


setInterval(()=>{


let h=document.createElement("div");


h.className="heart";


h.innerHTML="❤️";


h.style.left=Math.random()*100+"%";


h.style.animationDuration=

3+Math.random()*5+"s";


document.body.appendChild(h);



setTimeout(()=>{

h.remove();

},7000);



},500);






// efek kembang api


function confetti(){


for(let i=0;i<100;i++){


let c=document.createElement("div");


c.innerHTML="🎉";


c.style.position="absolute";


c.style.left=Math.random()*100+"%";


c.style.top=Math.random()*100+"%";


c.style.fontSize="30px";


document.body.appendChild(c);



setTimeout(()=>{

c.remove();

},3000);



}

}



</script>


</body>
</html>
