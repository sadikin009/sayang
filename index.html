<!DOCTYPE html>
<html>
<head>
<title>For Someone Special ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
    overflow:hidden;
}


/* halaman nama */

#login{

    text-align:center;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 0 30px white;

}


#login h1{

    color:#ff416c;
    margin-bottom:20px;

}


input{

    padding:15px;
    width:300px;
    border-radius:30px;
    border:2px solid pink;
    font-size:18px;
    text-align:center;

}


button{

    margin-top:20px;
    padding:15px 35px;
    border:none;
    border-radius:30px;
    background:#ff416c;
    color:white;
    font-size:18px;
    cursor:pointer;

}


button:hover{

    background:#ff1744;

}



/* halaman cinta */

#lovePage{

    display:none;
    text-align:center;
    color:white;

}


.card{

    width:700px;
    padding:40px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    border-radius:30px;
}


h1{

    font-size:40px;
    text-shadow:0 0 20px white;

}


p{

    font-size:22px;
    margin:25px;

}



.container{

    background:black;
    height:60px;
    border-radius:30px;
    overflow:hidden;
    padding:12px;

}


#running{

    color:yellow;
    font-size:30px;
    white-space:nowrap;
    position:relative;
    font-weight:bold;

}



/* hati */

.heart{

position:absolute;
color:white;
font-size:25px;
animation:jatuh 6s linear infinite;

}


@keyframes jatuh{

from{
transform:translateY(-100px);
}

to{
transform:translateY(100vh);
}

}


</style>

</head>


<body>


<!-- Masukkan nama -->

<div id="login">

<h1>❤️ Untuk Kamu ❤️</h1>

<p>Masukkan nama kamu dulu</p>

<input id="nama" placeholder="Nama kamu...">

<br>

<button onclick="mulai()">
Buka Pesan 💌
</button>


</div>



<!-- halaman cinta -->


<div id="lovePage">


<div class="card">


<h1 id="judul"></h1>


<p id="pesan"></p>


<div class="container">

<div id="running">
Aku punya sesuatu yang ingin aku sampaikan ❤️
</div>

</div>


</div>

</div>



<script>


function mulai(){


let nama=document.getElementById("nama").value;


if(nama==""){

alert("Masukkan nama terlebih dahulu ❤️");

return;

}


document.getElementById("login").style.display="none";

document.getElementById("lovePage").style.display="block";



document.getElementById("judul").innerHTML=
"Untuk "+nama+" ❤️";


document.getElementById("pesan").innerHTML=

"Sejak mengenal kamu, aku merasa ada sesuatu yang berbeda. "+
"Kamu membuat hari-hariku menjadi lebih indah. "+
"Aku tidak tahu bagaimana masa depan nanti, "+
"tapi aku ingin menjalaninya bersama kamu. ❤️ <br><br>"+

"Apakah kamu mau menjadi seseorang yang spesial dalam hidupku? 💖";

}



// running text


let text=document.getElementById("running");

let posisi=700;


setInterval(()=>{


posisi--;

text.style.left=posisi+"px";


if(posisi < -text.offsetWidth){

posisi=700;

}


},10);



// hati bergerak


setInterval(()=>{


let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"%";

h.style.animationDuration=
(3+Math.random()*5)+"s";


document.body.appendChild(h);


setTimeout(()=>{

h.remove();

},7000);



},500);



</script>


</body>
</html>
