<!DOCTYPE html>
<html>
<head>
<title>Running Text Love</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Arial', sans-serif;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#6a11cb);
    overflow:hidden;
}


/* efek hati */
.heart{
    position:absolute;
    color:white;
    font-size:25px;
    animation:jatuh 8s linear infinite;
}

@keyframes jatuh{

0%{
    transform:translateY(-100px) rotate(0deg);
}

100%{
    transform:translateY(100vh) rotate(360deg);
}

}


/* kartu utama */

.card{

    width:700px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:40px;
    text-align:center;
    box-shadow:0 0 30px rgba(255,255,255,0.5);

}


h1{

color:white;
font-size:35px;
margin-bottom:20px;
text-shadow:0 0 20px pink;

}


/* running text */

.container{

height:70px;
background:#000;
border-radius:50px;
overflow:hidden;
padding:15px;
box-shadow:0 0 20px yellow;

}


#running{

color:#ffff00;
font-size:35px;
font-weight:bold;
white-space:nowrap;
position:relative;

text-shadow:
0 0 5px yellow,
0 0 10px yellow,
0 0 20px orange;

}


/* tombol */

button{

margin-top:25px;
padding:12px 30px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff4b91;
font-weight:bold;

}


button:hover{

background:#ff4b91;
color:white;

}


/* jam */

#jam{

margin-top:20px;
color:white;
font-size:25px;

}


</style>

</head>


<body>


<div class="card">


<h1>💖 Special For You 💖</h1>


<div class="container">

<div id="running">
I Love You Sayangkuu Tirta ❤️ Semoga Selalu Bahagia Bersama ❤️
</div>

</div>


<button onclick="kontrol()" id="btn">
⏸ Pause
</button>


<div id="jam"></div>


</div>



<script>


let text=document.getElementById("running");

let posisi=700;

let jalan=true;


function animasi(){

if(jalan){

posisi--;

text.style.left=posisi+"px";


if(posisi < -text.offsetWidth){

posisi=700;

}

}

}


setInterval(animasi,10);



function kontrol(){

jalan=!jalan;


let tombol=document.getElementById("btn");


if(jalan){

tombol.innerHTML="⏸ Pause";

}else{

tombol.innerHTML="▶ Play";

}


}



// jam digital

function waktu(){

let sekarang=new Date();

document.getElementById("jam").innerHTML=

"🕒 "+sekarang.toLocaleTimeString();

}


setInterval(waktu,1000);

waktu();




// membuat hati random

function buatHati(){

let hati=document.createElement("div");

hati.className="heart";

hati.innerHTML="❤️";


hati.style.left=Math.random()*100+"%";

hati.style.animationDuration=
(5+Math.random()*5)+"s";


document.body.appendChild(hati);


setTimeout(()=>{

hati.remove();

},8000);


}


setInterval(buatHati,500);



</script>


</body>
</html>
